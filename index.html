<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d7a3e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>NextGen Mart - Mysore</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
html,body{overflow-x:hidden;font-family:'DM Sans',sans-serif;background:#e8ebe9;overscroll-behavior:none}
:root{
  --primary:#0d7a3e;--primary-light:#e8f5ee;--primary-dark:#065c2e;
  --accent:#f59e0b;--bg:#f8faf9;--card:#fff;
  --text:#1a2e1f;--text2:#5f7567;--border:#e2e8e4;
  --grad:linear-gradient(135deg,#0d7a3e 0%,#15803d 50%,#059669 100%);
  --grad-accent:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);
}

.app{width:100%;max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);position:relative;overflow-x:hidden;box-shadow:0 0 60px rgba(0,0,0,.12)}

/* Header */
.header{background:var(--grad);padding:14px 20px;position:sticky;top:0;z-index:50}
.header-row{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff}
.logo-text{color:#fff;font-size:20px;font-weight:700;letter-spacing:-.5px;font-family:'Playfair Display',serif}
.logo-sub{color:rgba(255,255,255,.8);font-size:11px;font-weight:500;letter-spacing:.5px}
.header-icons{display:flex;gap:10px;align-items:center}
.h-icon{color:#fff;background:rgba(255,255,255,.15);border-radius:12px;padding:8px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center}
.badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:20px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;border:2px solid var(--primary)}

/* Content */
.content{padding-bottom:90px;min-height:calc(100vh - 56px)}

/* Bottom Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 max(8px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;cursor:pointer;color:var(--text2);transition:all .2s;border-radius:12px;font-weight:500;font-size:11px;border:none;background:transparent;font-family:inherit}
.nav-item.active{color:var(--primary);background:var(--primary-light);font-weight:600}

/* Sections */
.section{padding:20px 20px 8px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.see-all{font-size:13px;color:var(--primary);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:2px;border:none;background:none;font-family:inherit}

/* Cards */
.product-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px;cursor:pointer;transition:all .2s;position:relative;min-width:155px;max-width:155px;flex-shrink:0}
.product-card:active{transform:scale(.97)}
.discount-badge{position:absolute;top:10px;left:10px;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;z-index:2}
.product-img{text-align:center;background:var(--primary-light);border-radius:12px;padding:18px 0;margin-bottom:10px;font-size:40px}
.product-brand{font-size:12px;color:var(--text2);margin-bottom:2px}
.product-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3;height:34px;overflow:hidden}
.product-weight{font-size:11px;color:var(--text2);margin-bottom:6px}
.product-bottom{display:flex;align-items:center;justify-content:space-between}
.price{font-size:16px;font-weight:800;color:var(--primary)}
.mrp{font-size:11px;color:#aaa;text-decoration:line-through;margin-left:4px}
.add-btn{width:30px;height:30px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;border:none;flex-shrink:0}
.add-btn:active{transform:scale(.9)}

/* Category Grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;border-radius:14px;background:#fff;border:1px solid var(--border);cursor:pointer;font-size:28px;transition:all .15s}
.cat-item:active{transform:scale(.95)}
.cat-label{font-size:10px;font-weight:600;color:var(--text);text-align:center}

/* Quick Actions */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 20px 8px}
.qa-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:16px;cursor:pointer;transition:all .15s;border:none;font-family:inherit}
.qa-item:active{transform:scale(.95)}
.qa-label{font-size:11px;font-weight:600}

/* Promo */
.promo{border-radius:20px;padding:22px 20px;position:relative;overflow:hidden;min-height:120px;transition:background .6s ease}
.promo .circle1{position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.1)}
.promo .circle2{position:absolute;bottom:-30px;right:40px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
.promo-badge{background:rgba(255,255,255,.25);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px;display:inline-block}
.promo h3{color:#fff;font-size:22px;font-weight:800;margin:10px 0 4px;line-height:1.1}
.promo p{color:rgba(255,255,255,.85);font-size:13px;margin:0}
.dots{display:flex;gap:6px;margin-top:12px}
.dot{height:6px;border-radius:3px;transition:all .3s}

/* Loyalty Bar */
.loyalty-bar{background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 100%);border-radius:16px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 15px rgba(245,158,11,.25)}
.loyalty-pts{font-size:20px;font-weight:800;color:#fff}
.loyalty-label{font-size:11px;color:rgba(255,255,255,.85);font-weight:500}
.redeem-btn{background:rgba(255,255,255,.25);border-radius:12px;padding:8px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit}

/* Overlay & Modal */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:92vh;overflow:auto;padding:24px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.overlay.open .modal{transform:translateY(0)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700;color:var(--text)}
.close-btn{cursor:pointer;color:var(--text2);background:none;border:none;padding:4px}

/* Search */
.search-bar{display:flex;align-items:center;background:rgba(255,255,255,.18);border-radius:14px;padding:12px 16px;cursor:pointer;gap:10px;margin:4px 16px 18px;transition:all .2s}
.search-bar span{color:rgba(255,255,255,.7);font-size:14px}
.search-input{flex:1;border:none;background:transparent;font-size:15px;font-family:inherit;outline:none;color:var(--text)}
.search-box{flex:1;display:flex;align-items:center;background:var(--primary-light);border-radius:14px;padding:12px 16px;gap:10px}

/* List Items */
.list-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;background:#fff;border:1px solid var(--border);transition:all .2s}
.checkbox{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.checkbox.checked{border:none;background:var(--primary)}
.aisle-tag{font-size:11px;font-weight:600;color:var(--primary);background:var(--primary-light);padding:3px 10px;border-radius:8px}

/* Cart Items */
.cart-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;background:var(--bg)}
.qty-btn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-family:inherit}

/* Buttons */
.btn-primary{background:var(--grad);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:inherit;transition:all .2s}
.btn-primary:active{transform:scale(.98)}
.btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:12px;padding:12px 20px;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}

/* Product Detail */
.pd-img{text-align:center;background:var(--primary-light);border-radius:20px;padding:32px 20px;margin-bottom:20px;font-size:72px}
.pd-stock{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block;margin-right:8px}
.in-stock{background:#dcfce7;color:#16a34a}
.pd-aisle{background:#fef3c7;color:#92400e;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block}
.pd-name{font-size:22px;font-weight:700;color:var(--text);margin:8px 0 4px;line-height:1.2}
.pd-brand{font-size:14px;color:var(--text2);margin-bottom:12px}
.stars{display:flex;align-items:center;gap:3px;color:#f59e0b;margin-bottom:16px}
.pd-price{font-size:28px;font-weight:800;color:var(--primary)}
.pd-mrp{font-size:16px;color:#aaa;text-decoration:line-through;margin-left:10px}
.off-badge{font-size:13px;font-weight:700;color:#dc2626;background:#fee2e2;padding:2px 8px;border-radius:8px;margin-left:10px}

/* Find in store */
.find-store{display:flex;align-items:center;gap:10px;padding:14px;border-radius:14px;background:#fffbeb;border:1px solid #fde68a;margin-bottom:16px;cursor:pointer}

/* Map */
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.aisle-card{border-radius:12px;padding:12px;transition:all .3s}
.aisle-card.highlight{transform:scale(1.03)}
.aisle-name{font-size:13px;font-weight:700;margin-bottom:6px}
.aisle-section{font-size:10px;padding:2px 0 2px 4px;border-radius:4px}
.map-footer{display:flex;justify-content:space-between;margin-top:12px;font-size:11px;color:var(--text2)}

/* Scanner */
.scanner-viewport{width:100%;aspect-ratio:1;max-width:280px;margin:0 auto 24px;border-radius:24px;background:#111;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.scan-corner{position:absolute;width:40px;height:40px}
.scan-corner.tl{top:20px;left:20px;border-top:3px solid var(--primary);border-left:3px solid var(--primary);border-radius:4px 0 0 0}
.scan-corner.tr{top:20px;right:20px;border-top:3px solid var(--primary);border-right:3px solid var(--primary);border-radius:0 4px 0 0}
.scan-corner.bl{bottom:20px;left:20px;border-bottom:3px solid var(--primary);border-left:3px solid var(--primary);border-radius:0 0 0 4px}
.scan-corner.br{bottom:20px;right:20px;border-bottom:3px solid var(--primary);border-right:3px solid var(--primary);border-radius:0 0 4px 0}
.scan-line{position:absolute;left:30px;right:30px;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);box-shadow:0 0 15px rgba(13,122,62,.5);animation:scanLine 2s ease-in-out infinite}
@keyframes scanLine{0%,100%{top:25%}50%{top:70%}}

/* Steps */
.step-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text)}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* Cart Float */
.cart-float{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--grad);color:#fff;border-radius:16px;padding:12px 22px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 6px 25px rgba(13,122,62,.35);z-index:90;max-width:380px;width:calc(100% - 40px)}
.cart-float:active{transform:translateX(-50%) scale(.98)}
.cart-float-count{background:rgba(255,255,255,.2);border-radius:10px;padding:4px 10px;font-size:14px;font-weight:700}

/* Offers */
.offer-card{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden}
.offer-body{padding:16px}
.offer-footer{border-top:1px dashed var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.promo-code{font-family:monospace;font-size:14px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:4px 10px;border-radius:8px;letter-spacing:1px}

/* Loyalty Card */
.loyalty-card{background:var(--grad);border-radius:20px;padding:24px 20px;margin-bottom:20px;position:relative;overflow:hidden}
.loyalty-card .circle1{position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08)}
.loyalty-card .circle2{position:absolute;bottom:-20px;left:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.points-big{font-size:40px;font-weight:800;color:#fff;margin-bottom:4px}
.loy-btn{background:rgba(255,255,255,.2);border-radius:12px;padding:10px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit}

/* Earn row */
.earn-row{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;background:#fff;border:1px solid var(--border)}
.earn-icon{font-size:28px}
.earn-pts{font-size:12px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:4px 10px;border-radius:8px}

/* Coupon */
.coupon-row{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;background:#fff;border:1px solid var(--border)}
.coupon-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.coupon-btn{border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#fff}

/* Order options */
.order-opt{display:flex;align-items:flex-start;gap:14px;padding:16px;border-radius:16px;cursor:pointer;transition:all .15s}
.order-opt:active{transform:scale(.98)}

/* Horizontal scroll */
.h-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory}
.h-scroll>*{scroll-snap-align:start}

/* Recommended */
.rec-item{display:flex;align-items:center;gap:14px;padding:12px;border-radius:14px;background:#fff;border:1px solid var(--border);cursor:pointer}
.rec-img{width:56px;height:56px;border-radius:14px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}

/* Progress bar */
.progress-bg{height:8px;border-radius:4px;background:#d1e7d9}
.progress-fill{height:8px;border-radius:4px;background:var(--primary);transition:width .3s}

/* Route */
.route-box{background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:14px;margin-top:16px}

/* Add item bar */
.add-item-bar{display:flex;gap:8px;margin-bottom:16px}
.add-input{flex:1;border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;font-family:inherit;outline:none;background:#fff}
.add-input:focus{border-color:var(--primary)}
.add-item-btn{background:var(--primary);border:none;border-radius:12px;padding:0 16px;cursor:pointer;color:#fff;display:flex;align-items:center}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

/* Install banner */
.install-banner{background:var(--primary-light);border:1px solid var(--primary);border-radius:14px;padding:14px 16px;margin:12px 20px 0;display:flex;align-items:center;gap:12px}
.install-banner-text{flex:1;font-size:13px;color:var(--text);font-weight:500}
.install-banner-btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
</style>
</head>

// ============== HELPERS ==============
function addToCart(product) {
  const exists = state.cart.find(i => i.id === product.id);
  if (exists) {
    state.cart = state.cart.map(i => i.id === product.id ? {...i, qty: i.qty + 1} : i);
  } else {
    state.cart = [...state.cart, {...product, qty: 1}];
  }
  showToast(`${product.name} added to cart`);
  render();
}

function removeFromCart(id) {
  const item = state.cart.find(i => i.id === id);
  if (item && item.qty > 1) {
    state.cart = state.cart.map(i => i.id === id ? {...i, qty: i.qty - 1} : i);
  } else {
    state.cart = state.cart.filter(i => i.id !== id);
  }
  render();
}

function cartTotal() { return state.cart.reduce((s, i) => s + i.price * i.qty, 0); }
function cartCount() { return state.cart.reduce((s, i) => s + i.qty, 0); }
function cartSavings() { return state.cart.reduce((s, i) => s + (i.mrp - i.price) * i.qty, 0); }

function discountPct(p) { return p.price < p.mrp ? Math.round((1 - p.price / p.mrp) * 100) : 0; }

function filteredProducts() {
  return products.filter(p => {
    if (state.activeCategory) return p.category === state.activeCategory;
    if (state.searchQuery) return p.name.toLowerCase().includes(state.searchQuery.toLowerCase()) || p.brand.toLowerCase().includes(state.searchQuery.toLowerCase());
    return true;
  });
}

function starsHTML(rating) {
  return Array.from({length:5}, (_,i) => `<span style="opacity:${i < Math.floor(rating) ? 1 : 0.3}">${svg.star}</span>`).join('');
}

let toastTimer;
function showToast(msg) {
  state.toast = msg;
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { state.toast = null; render(); }, 2000);
}

// ============== OVERLAYS ==============
function renderOverlay() {
  if (!state.overlay) return '';
  
  let content = '';
  switch(state.overlay) {
    case 'search': content = renderSearchModal(); break;
    case 'product': content = renderProductModal(); break;
    case 'scanner': content = renderScannerModal(); break;
    case 'map': content = renderMapModal(); break;
    case 'checkout': content = renderCheckoutModal(); break;
    case 'order': content = renderOrderModal(); break;
    default: return '';
  }
  
  return `<div class="overlay open" onclick="setState({overlay:null,selectedProduct:null,mapTarget:null,searchQuery:'',activeCategory:null})"><div class="modal" onclick="event.stopPropagation()">${content}</div></div>`;
}

function renderSearchModal() {

// PWA Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.createElement('div');
  banner.className = 'install-banner';
  banner.innerHTML = `
    <span style="font-size:24px">📲</span>
    <span class="install-banner-text">Install NextGen Mart for the best experience</span>
    <button class="install-banner-btn" id="installBtn">Install App</button>
  `;
  document.querySelector('.content')?.prepend(banner);
  document.getElementById('installBtn')?.addEventListener('click', () => {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; banner.remove(); });
  });
});
</script>
